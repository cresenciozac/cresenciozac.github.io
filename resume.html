<!DOCTYPE html>
<html lang="en">
<head>
    <title>Resume - Zac Cresencio's Portfolio</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="description" content="Zac Cresencio - Electrical Engineering student at UMN specializing in power systems and renewable energy.">
    <meta name="keywords" content="Zac Cresencio, Electrical Engineering, UMN, portfolio, power systems, solar energy">
    <meta name="author" content="Zac Cresencio">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Stack+Sans+Headline:wght@200..700&display=swap" rel="stylesheet">    
    <style>

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Color Vars */
        :root {
            --bg: #1d1a1e;
            --ink: #faf6ff;
            --muted: #d3baf2;
            --muted2: #7b747d;
            --accent: #ceacf8;
            --rule: #2f2e34;
        }

        body {
            background: var(--bg);
            color: var(--ink);

        }

        /* Nav Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 4rem 4rem;
            border-bottom: 1px solid var(--rule);
        }

        nav .logo {
            font-family: "Montserrat", sans-serif;
            font-size: 1.5rem;
            font-weight: 300;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--muted);
        }

        nav ul {
            list-style:none;
            display: flex;
            gap: 2.5rem;
        }

        nav ul a {
            font-family: "Montserrat", sans-serif;
            font-size: 1rem;
            font-weight: 300;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--muted);

        }

        nav .logo:hover { color: var(--ink); }
        nav ul a:hover { color: var(--ink); }

        /* Hero */
        .hero {
            background-image: url('assets/images/resume-bg.jpg');
            background-size: cover;
            background-position: center;
            flex: 1;
            gap: 12rem;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 4rem 6rem 4rem;
            font-family: "Montserrat", sans-serif;
        }

        .hero-content {
            flex: 1;
            opacity: 0;
            animation: fadeUp 0.6s 0.1s forwards;

        }

        .hero-portrait {
            flex-shrink: 0;
            width: 350px;
            height: 350px;
        }

        .hero-portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20%;
        }

        .hero .eyebrow {
            color: var(--muted);
        }
        
        .hero h1 {
            font-family: "Stack Sans Headline", sans-serif;
            font-size: 4rem;
            font-weight: 300;
        }

        .hero p {
            line-height: 2;
        }

        /* Resume */
        iframe {
            width: 100%;
            height: 90vh;
            border:none;
        }

        .btn-download {
            font-family: "Montserrat", sans-serif;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink);
            background: var(--muted2);
            padding: 0.8rem 1.8rem;
            text-decoration: none;
            display: inline-block;
        }


        /* Footer */
        footer {
            padding: 1.5rem 4rem;
            border-top: 1px solid var(--rule);
            display: flex;
            justify-content: flex-end;
            align-items: right;
        }
 
    footer .socials {
      display: flex;
      gap: 1.5rem;
    }
 
    footer .socials a {
      font-family:'Courier New', Courier, monospace;
      font-size: .8rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    </style>
</head>
<body>

    <!-- Nav Bar -->
    <nav>
        <a class="logo" href="index.html">Zac Cresencio</a>
        <ul>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="resume.html">Resume</a></li>
            <li><a href="contact.html">Contact</a></li> 
        </ul>
    </nav>

    <!-- Hero -->
    <main class="hero">
        <div class="hero-content">
            <h1>Resume<br></h1>
        </div>
    </main>

    <!-- Resume -->
     <iframe src="assets/resume.pdf" width="100%" height="800px"></iframe>
     <a class="btn-download" href="assets/resume.pdf" download>Download Resume</a>

    <!-- Footer -->
    <footer>
        <div class="socials">
            <a href="https://linkedin.com/in/zac-cresencio" target="_blank">LinkedIn</a>
            <a href="mailto:cresenciozac@gmail.com">Email</a>
        </div>
    </footer>


</body>





</html>
